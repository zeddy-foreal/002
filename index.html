<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do list</title>
    <link rel="icon" href="css/icon.png">
    <link rel="stylesheet" href="css/all.min.css">
    <link rel="stylesheet" href="css/fontawesome.min.css">
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div class="title">
        <a href="#" class="logo">ZEDDY</a>
        <button class="mode"><i class="fa-solid fa-sun"></i></button>
    </div>
    <div class="wallpaper">
        <div class="light wall"></div>
        <div class="dark wall"></div>
    </div>
    <div class="container">
        <header>
            <input type="text" class="input" placeholder="create new task..">
            <button class="add">Add</button>
        </header>
        <div class="body">
            <div class="missions">
                        
            </div>
            <footer>
                <p class="numberoftasks">0 Tasks</p>
                <div class="buttons">
                    <button class="but all clicked">All</button>
                    <button class="but active">Active</button>
                    <button class="but completed">Completed</button>
                </div>
                <button class="removeall">Clear all</button>
            </footer>
        </div>
        
    </div>
<script src="javascript/main.js"></script>
</body>
</html>
